# Challenge 04 — Workload Identity & Key Vault Secrets
# Replace <MI_CLIENT_ID>, <KV_NAME>, and <TENANT_ID> with your values before applying.
#
# Apply with:
#   TENANT_ID=$(az account show --query tenantId -o tsv)
#   sed -e "s/<MI_CLIENT_ID>/$MI_CLIENT_ID/g" \
#       -e "s/<KV_NAME>/$KV_NAME/g" \
#       -e "s/<TENANT_ID>/$TENANT_ID/g" \
#       secretproviderclass.yaml | kubectl apply -f -
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fabtech-secrets
  namespace: fabtech
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<MI_CLIENT_ID>"
    keyvaultName: "<KV_NAME>"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: db-connection-string
          objectType: secret
    tenantId: "<TENANT_ID>"
  secretObjects:
    - data:
        - key: connectionString
          objectName: db-connection-string
      secretName: fabtech-db-secret
      type: Opaque
