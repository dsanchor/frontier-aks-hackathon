apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabtech-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: fabtech-api
  template:
    metadata:
      labels:
        app: fabtech-api
        # Uncomment when using Workload Identity (Challenge 04)
        # azure.workload.identity/use: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: fabtech-api
      # Uncomment when using Workload Identity (Challenge 04)
      # serviceAccountName: fabtech-api-sa
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          # Uncomment to mount Key Vault secrets via CSI driver (Challenge 04)
          # volumeMounts:
          #   - name: secrets-store
          #     mountPath: /mnt/secrets
          #     readOnly: true
          # env:
          #   - name: DATABASE_URL
          #     valueFrom:
          #       secretKeyRef:
          #         name: fabtech-db-secret
          #         key: connectionString
      # volumes:
      #   - name: secrets-store
      #     csi:
      #       driver: secrets-store.csi.k8s.io
      #       readOnly: true
      #       volumeAttributes:
      #         secretProviderClass: fabtech-secrets
