apiVersion: v1
kind: Service
metadata:
  name: fabtech-api
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: fabtech-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: fabtech-web
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: fabtech-web
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.port }}
